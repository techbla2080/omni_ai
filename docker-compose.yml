# OmniAI Docker Compose - Production Deployment
# Usage: docker compose up -d

services:
  # ========================================
  # NGINX - Reverse Proxy + Frontend
  # ========================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: always

  # ========================================
  # FASTAPI BACKEND
  # ========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://omniai:${DB_PASSWORD}@postgres:5432/omniai
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: always

  # ========================================
  # POSTGRESQL DATABASE
  # ========================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omniai
      POSTGRES_USER: omniai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # ========================================
  # REDIS CACHE
  # ========================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # ========================================
  # OLLAMA LLM
  # ========================================
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  # ========================================
  # CERTBOT (HTTPS - optional, run manually)
  # ========================================
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - ssl

volumes:
  postgres_data:
  redis_data:
  ollama_data: